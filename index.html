<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- MOBILE RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TITLE (SEO POWER KEYWORD STYLE) -->
    <title>VoyageMara Safaris | Maasai Mara & Kenya Luxury Safari Tours</title>

    <!-- META DESCRIPTION -->
    <meta
      name="description"
      content="Book luxury and affordable safari tours in Maasai Mara, Amboseli, Tsavo, Nakuru & Diani Beach with VoyageMara Safaris."
    />

    <!-- KEY SEO TAGS -->
    <meta name="keywords" content="Kenya safari, Maasai Mara safari, luxury safari Kenya, Amboseli tours, safari booking Kenya" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="VoyageMara Safaris" />
    <meta name="theme-color" content="#0b3d2e" />

    <!-- CANONICAL (VERY IMPORTANT FOR GOOGLE) -->
    <link rel="canonical" href="https://voyagemara.com" />

    <!-- OPEN GRAPH (FACEBOOK / WHATSAPP / LINK PREVIEW) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VoyageMara Safaris | Kenya Luxury Safari Tours" />
    <meta property="og:description" content="Explore Maasai Mara, Amboseli, Tsavo & more with expert safari guides in Kenya." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://voyagemara.com" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VoyageMara Safaris" />
    <meta name="twitter:description" content="Luxury safari experiences in Kenya's top wildlife destinations." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- STRUCTURED DATA (GOOGLE KNOWS YOUR BRAND) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "VoyageMara Safaris",
        "url": "https://voyagemara.com",
        "logo": "https://voyagemara.com/logo.png",
        "telephone": "+254705814181",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "KE",
          "addressLocality": "Maasai Mara"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
